name: 🌧️ CHIRPS Daily Update

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode update'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - backfill

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-chirps:
    name: Download & Simpan CHIRPS ke Supabase
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests pandas numpy

      - name: 🔍 Cek credentials
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "❌ SUPABASE_URL belum diset di GitHub Secrets!"
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ SUPABASE_ANON_KEY belum diset di GitHub Secrets!"
            exit 1
          fi
          echo "✅ Credentials OK"

      - name: 🌧️ Download CHIRPS & Simpan ke Supabase
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TZ: Asia/Jakarta
        run: |
          if [ "${{ github.event.inputs.mode }}" = "backfill" ]; then
            echo "Mode: Backfill 30 hari terakhir"
            python chirps_update.py --backfill --days 30
          else
            echo "Mode: Update harian"
            python chirps_update.py
          fi
          echo "✅ Selesai!"
